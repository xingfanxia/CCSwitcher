name: CCSwitcher
options:
  bundleIdPrefix: me.xueshi
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: false
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 584KQTRF3B
    SWIFT_STRICT_CONCURRENCY: targeted

targets:
  CCSwitcher:
    type: application
    platform: macOS
    sources:
      - path: CCSwitcher
      - path: Shared
    info:
      path: CCSwitcher/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: $(PRODUCT_NAME)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleURLTypes:
          - CFBundleURLName: me.xueshi.ccswitcher
            CFBundleURLSchemes:
              - ccswitcher
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.xueshi.ccswitcher
        CODE_SIGN_ENTITLEMENTS: CCSwitcher/Resources/CCSwitcher.entitlements
        PRODUCT_NAME: CCSwitcher
        MARKETING_VERSION: "1.2.0"
        CURRENT_PROJECT_VERSION: "36"
        COMBINE_HIDPI_IMAGES: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
    entitlements:
      path: CCSwitcher/Resources/CCSwitcher.entitlements
      properties:
        com.apple.security.application-groups:
          - group.me.xueshi.ccswitcher
    dependencies:
      - target: CCSwitcherWidgetExtension
        embed: true
        codeSign: true

  CCSwitcherWidgetExtension:
    type: extensionkit-extension
    platform: macOS
    sources:
      - path: CCSwitcherWidget
      - path: Shared
    info:
      path: CCSwitcherWidget/Info.plist
      properties:
        CFBundleDisplayName: CCSwitcher Widget
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        EXAppExtensionAttributes:
          EXExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.xueshi.ccswitcher.widget
        CODE_SIGN_ENTITLEMENTS: CCSwitcherWidget/Resources/CCSwitcherWidget.entitlements
        PRODUCT_NAME: CCSwitcherWidgetExtension
        MARKETING_VERSION: "1.2.0"
        CURRENT_PROJECT_VERSION: "36"
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 584KQTRF3B
        SWIFT_STRICT_CONCURRENCY: targeted
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @executable_path/../../../../Frameworks"
        SKIP_INSTALL: true
    entitlements:
      path: CCSwitcherWidget/Resources/CCSwitcherWidget.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.application-groups:
          - group.me.xueshi.ccswitcher
