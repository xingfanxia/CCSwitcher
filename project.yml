name: CCSwitcher
options:
  bundleIdPrefix: me.xueshi
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: false
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: "NO"
    SWIFT_STRICT_CONCURRENCY: targeted

targets:
  CCSwitcher:
    type: application
    platform: macOS
    sources:
      - path: CCSwitcher
        excludes:
          - "Resources/**"
    resources:
      - path: CCSwitcher/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.xueshi.ccswitcher
        INFOPLIST_FILE: CCSwitcher/Info.plist
        CODE_SIGN_ENTITLEMENTS: CCSwitcher/Resources/CCSwitcher.entitlements
        GENERATE_INFOPLIST_FILE: false
        PRODUCT_NAME: CCSwitcher
        MARKETING_VERSION: "1.0.1"
        CURRENT_PROJECT_VERSION: "21"
        COMBINE_HIDPI_IMAGES: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
    entitlements:
      path: CCSwitcher/Resources/CCSwitcher.entitlements
